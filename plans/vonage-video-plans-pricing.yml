specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Vonage Video API
providerId: vonage-video
created: '2026-06-20'
modified: '2026-06-20'
reconciled: false
tags:
- Video
- WebRTC
- Live Streaming
- Real-Time Communications
- CPaaS
- Plans
description: >-
  Vonage Video API uses usage-based, per-minute pricing. Core real-time video
  is billed per participant-minute, with separate per-minute meters for
  archiving (recording), live streaming broadcasts (creation and HLS viewing),
  the Experience Composer render service, Audio Connector, SIP interconnect,
  and live captions. New accounts start with a free trial credit; volume and
  Enterprise pricing is negotiated with Vonage. Representative published rates
  are listed below; exact amounts vary by region and contract and are not fully
  reconciled in this artifact.
notes: >-
  Rates below are representative of Vonage's published Video API pricing page
  and should be reconciled against the live pricing page; some meters (SIP
  interconnect, Audio Connector, live captions, Experience Composer) are not
  fully published and are marked unknown.
sources:
- https://www.vonage.com/communications-apis/video/pricing/
- https://api.support.vonage.com/hc/en-us/sections/6646174769436-Video-API
- https://developer.vonage.com/en/video/overview
plans:
- id: vonage-video-pay-as-you-go
  name: Pay-as-you-go
  type: usage
  description: >-
    Per-minute metered usage across video sessions, archiving, broadcasts,
    and advanced services with no monthly minimum.
  entries:
  - label: Participant Minutes
    name: participant_minutes
    type: usage
    metric: participant_minutes
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: $0.0041 per participant per minute (sessions up to 25 active publishers)
    userMultiplied: true
  - label: Individual Stream Archiving
    name: archive_individual
    type: usage
    metric: minutes
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: $0.0125 per recorded minute
    userMultiplied: false
