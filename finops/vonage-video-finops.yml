description: >-
  FinOps view of Vonage Video API spend. Vonage bills usage on a
  per-stream-minute (participant-minute) model for real-time video, with
  separate per-minute meters for archiving (recording), broadcast creation,
  HLS viewer minutes, the Experience Composer render service, Audio Connector,
  SIP interconnect, and live captions. Resolution (SD/HD/FHD) drives the per
  minute rate for archives and broadcasts. An automatic monthly volume discount
  applies to participant minutes above a threshold.
notes: >-
  Per-minute rates differ by resolution, region, and contract and are subject
  to change; verify against the Vonage Video API pricing page during
  reconciliation. Some advanced-service meters are not fully published.
