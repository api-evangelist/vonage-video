meters:
- name: participant_minutes
  description: Real-time video participant-minutes (per publisher/subscriber per minute), billed per minute.
  unit: minutes
  aggregation: sum
  dimensions:
  - application
  - session
- name: archive_minutes
  description: Recorded archive minutes, billed per minute by output mode and resolution (SD/HD/FHD).
  unit: minutes
  aggregation: sum
  dimensions:
  - application
  - resolution
  - outputMode
- name: broadcast_minutes
  description: Live streaming broadcast minutes created, billed per minute by resolution (SD/HD/FHD).
  unit: minutes
  aggregation: sum
  dimensions:
  - application
  - resolution
- name: hls_viewer_minutes
  description: HLS content minutes viewed per viewer, billed per minute by resolution.
  unit: minutes
  aggregation: sum
  dimensions:
  - application
  - resolution
- name: render_minutes
  description: Experience Composer render service minutes, billed per minute.
  unit: minutes
  aggregation: sum
  dimensions:
  - application
- name: audio_connector_minutes
  description: Audio Connector (WebSocket audio) minutes, billed per minute.
  unit: minutes
  aggregation: sum
  dimensions:
  - application
- name: sip_minutes
  description: SIP interconnect minutes plus PSTN termination, billed per minute.
  unit: minutes
  aggregation: sum
  dimensions:
  - application
- name: captions_minutes
  description: Live caption minutes, billed per minute.
  unit: minutes
  aggregation: sum
  dimensions:
  - application
principles:
- name: Visibility
  description: Pull Vonage usage and the Video API Reports API; inspect per-minute burn by session, resolution, and service.
- name: Allocation
  description: Tag applications and sessions per workload/team; map participant-minutes to internal cost centers.
- name: Optimization
  description: Record at the lowest acceptable resolution, prefer individual over composed archives where viable, cap broadcast maxDuration, and limit publishers per session to stay in the lower participant-minute tier.
- name: Accountability
  description: Assign owners per application/key; review monthly per-minute spend against budget and the volume-discount threshold.
