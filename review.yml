    - POST   https://video.api.vonage.com/v2/project/{applicationId}/session/{sessionId}/migrate
    - GET    https://video.api.vonage.com/v2/project/{applicationId}/session/{sessionId}/stream
    - GET    https://video.api.vonage.com/v2/project/{applicationId}/session/{sessionId}/stream/{streamId}
    - PUT    https://video.api.vonage.com/v2/project/{applicationId}/session/{sessionId}/stream
    - POST   https://video.api.vonage.com/v2/project/{applicationId}/session/{sessionId}/mute
    - POST   https://video.api.vonage.com/v2/project/{applicationId}/session/{sessionId}/stream/{streamId}/mute
    - POST   https://video.api.vonage.com/v2/project/{applicationId}/session/{sessionId}/signal
    - POST   https://video.api.vonage.com/v2/project/{applicationId}/session/{sessionId}/connection/{connectionId}/signal
