sources:
  - url: https://developer.vonage.com/en/api/video
    type: APIReference
    note: Primary Vonage Video REST API reference; v2 operations under video.api.vonage.com.
  - url: https://tokbox.com/developer/rest/
    type: APIReference
    note: Legacy OpenTok REST reference; same v2 operations on api.opentok.com.
  - url: https://developer.vonage.com/en/video/guides/session-monitoring
    type: Documentation
    note: Session monitoring webhook callbacks for session/connection/stream events.
  - url: https://developer.vonage.com/en/video/guides/secure-callbacks
    type: Documentation
    note: Secure (signed) callbacks for session, archive, broadcast, SIP, captions, and render events.
  - url: https://developer.vonage.com/en/video/guides/signaling
    type: Documentation
    note: Server-side signaling driven via REST POST .../signal; delivered to clients over the WebRTC data path.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    Real asynchronous surfaces (Audio Connector WebSocket and secure
    callback webhooks) exist and are documented. A dedicated Webhooks
    sub-API was included in apis.yml to represent the callback surface. An
    AsyncAPI document was not authored in this pass; if modeled later, the
    Audio Connector wss:// channel and the secure-callback event types are
    the channels to capture.
